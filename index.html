<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SubTracker" />
  <title>SubTracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Alert Banner -->
  <div class="alert-banner" id="alertBanner" style="display:none"></div>

  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <div class="header-label">MONTHLY SPEND</div>
        <button class="notify-btn" id="notifyBtn" title="Enable notifications">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
      </div>
      <div class="total-amount" id="totalAmount">$0</div>
      <div class="total-sub">per month · <span id="subCount">0</span> subscriptions</div>

      <!-- Upcoming strip -->
      <div class="upcoming-strip" id="upcomingStrip"></div>
    </header>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="all">All</button>
      <button class="tab" data-tab="upcoming">Upcoming</button>
    </div>

    <!-- Subscription list -->
    <main class="list" id="subList"></main>

    <!-- FAB -->
    <button class="fab" id="fabBtn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>

  </div>

  <!-- Add Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">New Subscription</h2>
        <button class="modal-close" id="modalClose">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="form">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input class="form-input" id="inputName" type="text" placeholder="Netflix, Spotify..." autocomplete="off" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Amount ($)</label>
            <input class="form-input" id="inputAmount" type="number" placeholder="9.99" step="0.01" min="0" />
          </div>
          <div class="form-group">
            <label class="form-label">Billing day</label>
            <input class="form-input" id="inputDay" type="number" placeholder="1–31" min="1" max="31" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Manage URL <span class="form-optional">(optional)</span></label>
          <input class="form-input" id="inputUrl" type="url" placeholder="https://..." />
        </div>
        <div class="form-group">
          <label class="form-label">Color</label>
          <div class="color-picker" id="colorPicker"></div>
        </div>
        <div class="form-actions">
          <button class="btn-cancel" id="btnCancel">Cancel</button>
          <button class="btn-save" id="btnSave">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete confirm -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <p class="confirm-text">Remove <strong id="confirmName"></strong>?</p>
      <div class="confirm-actions">
        <button class="btn-cancel" id="confirmNo">Keep</button>
        <button class="btn-delete" id="confirmYes">Remove</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
